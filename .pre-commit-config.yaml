default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        description: Format Rust code with cargo fmt (workspace only)
        entry: cargo fmt
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        description: Lint Rust code with clippy (denies warnings; covers all targets including tests)
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
      - id: check-file-lines
        name: check file line count
        description: Reject files exceeding line limits (src 600, tests 800)
        entry: scripts/check-file-lines.sh
        language: script
        types: [rust]
      - id: protect-default-branch
        name: refuse pushes to default branch
        entry: scripts/protect-default-branch.sh
        language: script
        pass_filenames: false
        always_run: true
        stages: [pre-push]
